<svg width="1280" height="720" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1f4d;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bgGradient)"/>
  
  <!-- 左侧：用户/输入 -->
  <g transform="translate(150, 360)">
    <circle cx="0" cy="0" r="60" fill="#b2f2bb" opacity="0.4" stroke="#2f9e44" stroke-width="3"/>
    <circle cx="0" cy="-15" r="20" fill="#2f9e44" opacity="0.8"/>
    <ellipse cx="0" cy="35" rx="35" ry="18" fill="#2f9e44" opacity="0.8"/>
  </g>
  
  <!-- 中间：多智能体协作网络 -->
  <g transform="translate(640, 360)">
    <!-- 中心协调器 -->
    <circle cx="0" cy="0" r="50" fill="#00d4ff" opacity="0.5" stroke="#00d4ff" stroke-width="3"/>
    
    <!-- 周围智能体节点 -->
    <g transform="translate(-150, -100)">
      <circle cx="0" cy="0" r="35" fill="#ffd43b" opacity="0.4" stroke="#e67700" stroke-width="2"/>
      <rect x="-12" y="-12" width="24" height="24" fill="#e67700" opacity="0.7" rx="4"/>
    </g>
    
    <g transform="translate(150, -100)">
      <circle cx="0" cy="0" r="35" fill="#ffc9c9" opacity="0.4" stroke="#e03131" stroke-width="2"/>
      <polygon points="0,-15 12,10 -12,10" fill="#e03131" opacity="0.7"/>
    </g>
    
    <g transform="translate(-150, 100)">
      <circle cx="0" cy="0" r="35" fill="#d0b2ff" opacity="0.4" stroke="#7048e8" stroke-width="2"/>
      <circle cx="-8" cy="-8" r="6" fill="#7048e8" opacity="0.7"/>
      <circle cx="8" cy="8" r="6" fill="#7048e8" opacity="0.7"/>
    </g>
    
    <g transform="translate(150, 100)">
      <circle cx="0" cy="0" r="35" fill="#b2f2bb" opacity="0.4" stroke="#2f9e44" stroke-width="2"/>
      <path d="M -12 -8 L 0 8 L 12 -8" fill="#2f9e44" opacity="0.7"/>
    </g>
    
    <!-- 连接线 -->
    <line x1="-50" y1="-25" x2="-125" y2="-85" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
    <line x1="50" y1="-25" x2="125" y2="-85" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
    <line x1="-50" y1="25" x2="-125" y2="85" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
    <line x1="50" y1="25" x2="125" y2="85" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
    
    <!-- 内部连接 -->
    <line x1="-115" y1="-85" x2="115" y2="-85" stroke="#00d4ff" stroke-width="1" opacity="0.3" stroke-dasharray="5,5"/>
    <line x1="-115" y1="85" x2="115" y2="85" stroke="#00d4ff" stroke-width="1" opacity="0.3" stroke-dasharray="5,5"/>
    <line x1="-115" y1="-85" x2="-115" y2="85" stroke="#00d4ff" stroke-width="1" opacity="0.3" stroke-dasharray="5,5"/>
    <line x1="115" y1="-85" x2="115" y2="85" stroke="#00d4ff" stroke-width="1" opacity="0.3" stroke-dasharray="5,5"/>
  </g>
  
  <!-- 右侧：输出/结果 -->
  <g transform="translate(1130, 360)">
    <rect x="-50" y="-40" width="100" height="80" fill="#00d4ff" opacity="0.3" stroke="#00d4ff" stroke-width="3" rx="10"/>
    <rect x="-35" y="-25" width="70" height="15" fill="#00d4ff" opacity="0.6" rx="3"/>
    <rect x="-35" y="-5" width="50" height="15" fill="#00d4ff" opacity="0.5" rx="3"/>
    <rect x="-35" y="15" width="60" height="15" fill="#00d4ff" opacity="0.4" rx="3"/>
  </g>
  
  <!-- 数据流箭头 -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00d4ff"/>
    </marker>
  </defs>
  
  <line x1="210" y1="360" x2="490" y2="360" stroke="#00d4ff" stroke-width="3" marker-end="url(#arrowhead)" opacity="0.7"/>
  <line x1="790" y1="360" x2="1070" y2="360" stroke="#00d4ff" stroke-width="3" marker-end="url(#arrowhead)" opacity="0.7"/>
  
  <!-- 科技感背景网格 -->
  <g opacity="0.05">
    <defs>
      <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
        <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#00d4ff" stroke-width="1"/>
      </pattern>
    </defs>
    <rect width="1280" height="720" fill="url(#grid)"/>
  </g>
</svg>
