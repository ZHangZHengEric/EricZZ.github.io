<svg width="1280" height="720" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景渐变 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1f4d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="1280" height="720" fill="url(#bgGradient)"/>
  
  <!-- 左侧对话气泡抽象 -->
  <g transform="translate(200, 360)">
    <ellipse cx="0" cy="0" rx="120" ry="80" fill="none" stroke="#00d4ff" stroke-width="3" opacity="0.6"/>
    <ellipse cx="-30" cy="-20" rx="80" ry="55" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.4"/>
    <ellipse cx="30" cy="20" rx="60" ry="40" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.3"/>
  </g>
  
  <!-- 右侧行动/执行抽象 -->
  <g transform="translate(1080, 360)">
    <polygon points="0,-100 90,50 -90,50" fill="none" stroke="#ff6b35" stroke-width="3" opacity="0.6"/>
    <polygon points="0,-70 70,40 -70,40" fill="none" stroke="#ff6b35" stroke-width="2" opacity="0.4"/>
    <polygon points="0,-40 50,30 -50,30" fill="none" stroke="#ff6b35" stroke-width="2" opacity="0.3"/>
  </g>
  
  <!-- 中间连接光效 -->
  <g transform="translate(640, 360)">
    <circle cx="0" cy="0" r="60" fill="none" stroke="url(#accentGradient)" stroke-width="4" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.4;0.8" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="40" fill="url(#accentGradient)" opacity="0.3"/>
    
    <!-- 数据流粒子 -->
    <circle cx="-150" cy="0" r="8" fill="#00d4ff" opacity="0.6">
      <animateTransform attributeName="transform" type="translate" from="-150 0" to="150 0" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-180" cy="-30" r="6" fill="#00d4ff" opacity="0.5">
      <animateTransform attributeName="transform" type="translate" from="-180 -30" to="180 -30" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-120" cy="30" r="7" fill="#00d4ff" opacity="0.55">
      <animateTransform attributeName="transform" type="translate" from="-120 30" to="120 30" dur="2.8s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- 科技感网格背景 -->
  <g opacity="0.1">
    <defs>
      <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
        <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00d4ff" stroke-width="1"/>
      </pattern>
    </defs>
    <rect width="1280" height="720" fill="url(#grid)"/>
  </g>
</svg>
