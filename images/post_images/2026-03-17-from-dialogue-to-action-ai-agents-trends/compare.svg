<svg width="1280" height="720" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1f4d;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bgGradient)"/>
  
  <!-- 分割线 -->
  <line x1="640" y1="50" x2="640" y2="670" stroke="#00d4ff" stroke-width="2" opacity="0.5" stroke-dasharray="10,5"/>
  
  <!-- 左侧：传统AI -->
  <g transform="translate(320, 360)">
    <!-- 标题区域 -->
    <rect x="-150" y="-200" width="300" height="40" fill="#e03131" opacity="0.2" rx="5"/>
    
    <!-- 单一模型 -->
    <circle cx="0" cy="-80" r="50" fill="#e03131" opacity="0.4" stroke="#e03131" stroke-width="3"/>
    <text x="0" y="-75" font-family="Arial" font-size="14" fill="#ffffff" text-anchor="middle" opacity="0.8">单一模型</text>
    
    <!-- 输入 -->
    <rect x="-80" y="20" width="40" height="60" fill="#e03131" opacity="0.3" rx="3"/>
    
    <!-- 输出 -->
    <rect x="40" y="20" width="40" height="60" fill="#e03131" opacity="0.3" rx="3"/>
    
    <!-- 单向箭头 -->
    <line x1="-40" y1="50" x2="40" y2="50" stroke="#e03131" stroke-width="3" opacity="0.7"/>
    <polygon points="40,50 30,45 30,55" fill="#e03131"/>
    
    <!-- 局限性标识 -->
    <g transform="translate(0, 120)">
      <circle cx="0" cy="0" r="25" fill="#e03131" opacity="0.3"/>
      <line x1="-15" y1="-15" x2="15" y2="15" stroke="#e03131" stroke-width="3"/>
      <line x1="15" y1="-15" x2="-15" y2="15" stroke="#e03131" stroke-width="3"/>
    </g>
  </g>
  
  <!-- 右侧：AI智能体 -->
  <g transform="translate(960, 360)">
    <!-- 标题区域 -->
    <rect x="-150" y="-200" width="300" height="40" fill="#00d4ff" opacity="0.2" rx="5"/>
    
    <!-- 多智能体网络 -->
    <circle cx="0" cy="-80" r="30" fill="#00d4ff" opacity="0.5" stroke="#00d4ff" stroke-width="2"/>
    <circle cx="-60" cy="-120" r="25" fill="#00d4ff" opacity="0.4" stroke="#00d4ff" stroke-width="2"/>
    <circle cx="60" cy="-120" r="25" fill="#00d4ff" opacity="0.4" stroke="#00d4ff" stroke-width="2"/>
    <circle cx="-60" cy="-40" r="25" fill="#00d4ff" opacity="0.4" stroke="#00d4ff" stroke-width="2"/>
    <circle cx="60" cy="-40" r="25" fill="#00d4ff" opacity="0.4" stroke="#00d4ff" stroke-width="2"/>
    
    <!-- 智能体间连接 -->
    <line x1="-30" y1="-95" x2="-60" y2="-115" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
    <line x1="30" y1="-95" x2="60" y2="-115" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
    <line x1="-30" y1="-65" x2="-60" y2="-55" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
    <line x1="30" y1="-65" x2="60" y2="-55" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
    <line x1="-60" y1="-105" x2="-60" y2="-55" stroke="#00d4ff" stroke-width="1" opacity="0.3" stroke-dasharray="3,3"/>
    <line x1="60" y1="-105" x2="60" y2="-55" stroke="#00d4ff" stroke-width="1" opacity="0.3" stroke-dasharray="3,3"/>
    
    <!-- 输入 -->
    <rect x="-80" y="20" width="40" height="60" fill="#00d4ff" opacity="0.3" rx="3"/>
    
    <!-- 输出 -->
    <rect x="40" y="20" width="40" height="60" fill="#00d4ff" opacity="0.3" rx="3"/>
    
    <!-- 双向箭头 -->
    <line x1="-40" y1="50" x2="40" y2="50" stroke="#00d4ff" stroke-width="3" opacity="0.7"/>
    <polygon points="40,50 30,45 30,55" fill="#00d4ff"/>
    <polygon points="-40,50 -30,45 -30,55" fill="#00d4ff"/>
    
    <!-- 能力标识 -->
    <g transform="translate(0, 120)">
      <circle cx="0" cy="0" r="30" fill="#00d4ff" opacity="0.3"/>
      <polygon points="0,-20 15,10 -15,10" fill="#00d4ff" opacity="0.7"/>
    </g>
  </g>
  
  <!-- 对比标签 -->
  <g font-family="Arial" font-size="16" fill="#ffffff" opacity="0.8">
    <text x="320" y="520" text-anchor="middle">传统 AI</text>
    <text x="960" y="520" text-anchor="middle">AI 智能体</text>
  </g>
</svg>
